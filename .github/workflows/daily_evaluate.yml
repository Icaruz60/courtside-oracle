name: Daily Evaluate

on:
  schedule:
    - cron: "0 12 * * *"   # 8:00 AM ET (12:00 UTC), after overnight games are final
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check results + update Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python src/pipeline/evaluate.py

      - name: Collect new box scores + update ELOs
        env:
          PROXIES: ${{ secrets.PROXIES }}
        run: python src/pipeline/update_season.py

      - name: Commit updated ELO snapshot
        run: |
          git config user.name  "courtside-oracle[bot]"
          git config user.email "bot@courtside-oracle"
          git add src/data/processed/player_elo_current.parquet
          git add src/data/processed/player_elo_current.csv
          git diff --cached --quiet || git commit -m "chore: daily ELO update [skip ci]"
          git push || true
